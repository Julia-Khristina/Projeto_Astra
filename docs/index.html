<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <title>ASTRA</title>
    <link rel="icon" type="logo/png" href="./assets/images/logo.png">
    
    <style>
        @font-face {
            font-family: 'APHONT';
            src: url('./assets/fonts/aphont.ttf');
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Bebas Neue', sans-serif;
            background-color: rgb(6, 10, 86);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            width: 100% !important;
            height: 100% !important;
        }

        #preload-font {
            font-family: 'APHONT';
            position: absolute;
            visibility: hidden;
        }
    </style>

</head>
<body>

    <div id="preload-font">.</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.85.0/dist/phaser.js"></script>

    <script type="module" src="src/main.js"></script>

</body>
</html>
